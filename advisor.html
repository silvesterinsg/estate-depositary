<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advisor Dashboard — Estate Planning with Silvester</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;font-family:'DM Sans',sans-serif;font-size:15px;background:#FAF7F2;color:#1C1410}
:root{--gold:#B8962E;--gold-light:#D4AF5A;--gold-pale:#F5EDD6;--gold-border:rgba(184,150,46,0.25);--maroon:#6B1A2A;--maroon-dark:#4A1019;--border:#E8DFD0;--ink:#1C1410;--ink-soft:#7A6455;--ink-mid:#4A3728;--success:#2D7A4A;--error:#B0312A;--radius:8px;--radius-sm:4px}
.topbar{background:var(--maroon-dark);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold-light);font-weight:500}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.05em;text-transform:uppercase;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.refresh-btn{padding:7px 14px;background:transparent;border:1px solid rgba(184,150,46,0.3);color:var(--gold-light);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.refresh-btn:hover{background:rgba(184,150,46,0.1)}
.main{padding:20px 16px 40px;max-width:960px;margin:0 auto}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;color:var(--maroon)}
/* SEARCH */
.search-wrap{margin-bottom:12px}
.search-bar{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none}
.search-bar:focus{border-color:var(--gold)}
/* CLIENT LIST */
.client-list{display:flex;flex-direction:column;gap:8px}
.client-row{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.client-row:hover{border-color:var(--gold)}
.client-name{font-weight:500;font-size:15px;color:var(--ink);margin-bottom:2px}
.client-meta{font-size:12px;color:var(--ink-soft)}
.badges{display:flex;gap:6px;flex-shrink:0;margin-left:12px;align-items:center}
.badge{padding:3px 8px;border-radius:3px;font-size:11px;font-weight:500}
.b-done{background:#D1FAE5;color:#065F46}
.b-part{background:#FEF3C7;color:#92400E}
.b-none{background:#F3F4F6;color:#6B7280}
.chev{color:var(--ink-soft);font-size:16px}
/* DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-size:13px;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:16px}
.client-hdr{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.client-hdr-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--ink);margin-bottom:3px}
.client-hdr-email{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.cred-item label{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:2px}
.cred-item span{font-size:13px;color:var(--ink);font-family:monospace}
/* DETAIL CARDS */
.det-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.det-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--maroon);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.det-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.det-row:last-child{border-bottom:none}
.det-lbl{color:var(--ink-soft);flex-shrink:0;margin-right:12px}
.det-val{font-weight:500;text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{background:var(--gold-pale);border:1px solid var(--gold-border);color:var(--ink-mid);padding:3px 8px;border-radius:var(--radius-sm);font-size:12px;font-weight:500}
.ndm{color:var(--ink-soft);font-size:13px;font-style:italic}
/* ENTRY TABLES */
.etbl{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:13px}
.etbl th{padding:7px 10px;background:var(--gold-pale);border:1px solid var(--border);font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink-mid);text-align:left}
.etbl td{padding:7px 10px;border:1px solid var(--border);color:var(--ink);vertical-align:top}
.etbl tr:nth-child(even) td{background:#FAFAF8}
/* ACCORDION */
.acc{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:#fff}
.acc-h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.acc-h:hover{background:var(--gold-pale)}
.acc-t{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--maroon);display:flex;align-items:center;gap:8px}
.acc-arr{color:var(--gold);transition:transform 0.25s;font-size:14px}
.acc.open .acc-arr{transform:rotate(180deg)}
.acc-body{display:none;padding:4px 14px 14px;border-top:1px solid var(--border)}
.acc.open .acc-body{display:block}
.qa{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.qa:last-child{border-bottom:none}
.qa-q{color:var(--ink-soft);flex:1;padding-right:10px;font-style:italic;font-size:12px}
.qa-a{font-weight:500;flex-shrink:0}
.qa-a.yes{color:#065F46}.qa-a.no{color:var(--error)}.qa-a.oth{color:var(--gold)}
/* FAMILY TREE CANVAS */
.ft-canvas-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--gold-pale);overflow:hidden;height:300px;position:relative}
.ft-mini{position:absolute;inset:0;width:100%;height:100%}
/* LOADING */
.loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:14px;font-style:italic}
.no-data{text-align:center;padding:40px;color:var(--ink-soft);font-size:14px;font-style:italic}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .cred-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ADVISOR LOGIN -->
<div id="loginScreen" style="min-height:100vh;background:var(--maroon-dark);background-image:radial-gradient(ellipse at 25% 75%,rgba(184,150,46,0.12) 0%,transparent 55%);display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="background:#fff;border-radius:var(--radius);padding:36px 28px;width:100%;max-width:380px;box-shadow:0 24px 80px rgba(0,0,0,0.4)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="width:46px;height:46px;background:var(--maroon);color:var(--gold-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;flex-shrink:0">S</div>
      <div><div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink)">Advisor Dashboard</div><div style="font-size:10px;color:var(--ink-soft);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px">Estate Planning with Silvester</div></div>
    </div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-mid);margin-bottom:6px">Advisor Password</label>
      <input type="password" id="advPw" placeholder="Enter advisor password" style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#FAF7F2;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;-webkit-appearance:none" onkeydown="if(event.key==='Enter')doAdvLogin()"/>
    </div>
    <div id="advErr" style="background:#FEF2F2;border:1px solid #FECACA;color:var(--error);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:none">Incorrect password.</div>
    <button onclick="doAdvLogin()" style="display:block;width:100%;padding:14px;background:var(--maroon);color:var(--gold-light);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer">Sign In</button>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="appScreen" style="display:none">
<div class="topbar">
  <div>
    <div class="topbar-brand">Advisor Dashboard</div>
    <div class="topbar-sub">Estate Planning with Silvester · v1.2</div>
  </div>
  <div class="topbar-right">
    <button class="refresh-btn" onclick="loadClients()">↻ Refresh</button>
  </div>
</div>

<div class="main">
  <div id="listView">
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Total Clients</div><div id="stTotal" class="stat-val">—</div></div>
      <div class="stat"><div class="stat-label">Assets Filed</div><div id="stAssets" class="stat-val">—</div></div>
      <div class="stat"><div class="stat-label">Beneficiaries Set</div><div id="stBen" class="stat-val">—</div></div>
      <div class="stat"><div class="stat-label">Appointments Set</div><div id="stAppt" class="stat-val">—</div></div>
    </div>
    <div class="search-wrap">
      <input type="text" class="search-bar" placeholder="Search by name or email..." oninput="filterClients(this.value)" id="searchBar"/>
    </div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--ink);margin-bottom:10px">All Clients</div>
    <div class="client-list" id="clientList"><div class="loading">Loading clients...</div></div>
  </div>

  <div id="detailView" style="display:none">
    <button class="back-btn" onclick="showList()">← Back to all clients</button>
    <div class="client-hdr">
      <div id="dName" class="client-hdr-name"></div>
      <div id="dEmail" class="client-hdr-email"></div>
      <div class="cred-grid">
        <div class="cred-item"><label>Username</label><span id="dUser"></span></div>
        <div class="cred-item"><label>Password</label><span id="dPass"></span></div>
        <div class="cred-item"><label>Client ID</label><span id="dId"></span></div>
        <div class="cred-item"><label>Created</label><span id="dCreated"></span></div>
      </div>
    </div>
    <div id="dContent"></div>
  </div>
</div>
</div><!-- end appScreen -->

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbx2BScnbDAYx9nfGrLLFyxv7LiHa5o3H8xmcaeWSkQ7LzjE1V7gh04JdcSElnznK-8n/exec';
var ALL=[];

var AT_LABELS={property:'Property',vehicles:'Vehicles',bankAccounts:'Bank Accounts',business:'Business Ownership',safeDeposit:'Safe Deposit Box',collectibles:'Collectibles & Valuables',investments:'Investment Accounts',digital:'Digital Assets',retirement:'Retirement Accounts',ip:'Intellectual Property',insurance:'Life Insurance Policies',others:'Others'};
var BT_LABELS={spouse:'Spouse',children_bio:'Children (Bio)',children_adopted:'Children (Adopted)',parents:'Parents',siblings:'Siblings',extended:'Extended Family',legally_entitled:'Legally Entitled',charity:'Charity',business_partners:'Business Partners',friends:'Friends/Others',special_needs:'Special Needs',others:'Others'};

var ENTRY_DEFS={
  property:{label:'Properties',headers:['Country','Type','Ownership','Co-owner','Loan','Value','Currency'],keys:['country','type','ownership','coowner','loan','value','currency']},
  bank:{label:'Bank Accounts',headers:['Bank','Type','Country','Currency','Ownership','Balance'],keys:['bank','type','country','currency','ownership','value']},
  joint:{label:'Joint Accounts',headers:['Institution','Type','Joint Owner','Country','Currency','Contribution'],keys:['institution','type','jointOwner','country','currency','contribution']},
  invest:{label:'Investments',headers:['Institution','Type','Country','Currency','Value','Bens Aware'],keys:['institution','type','country','currency','value','aware']},
  insurance:{label:'Insurance Policies',headers:['Insurer','Type','Policy No.','Sum Assured','Currency','Nomination','Nominee'],keys:['insurer','type','policy_no','sum','currency','nomination','nominee']},
  business:{label:'Business Interests',headers:['Name','Type','Country','Role','Ownership %','Co-owners','Value','Currency'],keys:['name','type','country','role','ownership_pct','coowners','value','currency']},
  loans:{label:'Loans & Liabilities',headers:['Type','Institution','Country','Outstanding','Currency','Covered'],keys:['type','institution','country','outstanding','currency','covered']},
  digital:{label:'Digital Assets',headers:['Platform','Type','Value','Currency','Access'],keys:['platform','type','value','currency','access']}
};

var PQ_LABELS={
  property:{autoTransfer:'Auto-transfer on passing?',familyHome:'Remain as family home?',commonDisaster:'Common disaster plan',maintainMeans:'Beneficiaries can maintain?',transferLimit:'Legal transfer limits?',relationshipEffect:'Will affect relationships?'},
  bank:{beneficiaryAware:'Beneficiaries aware?',nomination:'Nomination done?'},
  joint:{survivorWish:'Give to surviving joint owner?',conflictRisk:'Conflict risk?'},
  invest:{differentLaw:'Subject to different inheritance laws?',canManage:'Beneficiaries can manage?',managePref:'Management preference'},
  insurance:{throughWill:'Payout through Will?',trustPayout:'Hold in trust?'},
  business:{successor:'Successor identified?',buySell:'Buy-sell agreement?',keyPerson:'Key persons to inherit?',continuity:'If you pass away preference'},
  loans:{settlement:'Settlement planned?'},
  digital:{beneficiaryAware:'Beneficiaries know it exists?',legacyContact:'Legacy contact set up?'}
};

var CX_SECTIONS=[
  {k:'cpf',i:'🏦',t:'CPF',q:[{k:'ch',l:'How would you like CPF monies distributed?',st:1},{k:'cn',l:'CPF nomination done?'},{k:'cp',l:'Lump sum or Trust?'}]},
  {k:'overseas',i:'✈️',t:'Overseas Assets',q:[{k:'ho',l:'Assets in multiple countries?'},{k:'fh2',l:'Checked forced heirship laws?'},{k:'sw',l:'Separate Wills per country?'}]},
  {k:'col',i:'💎',t:'Collectibles & Valuables',q:[{k:'coh',l:'How will beneficiaries manage items?',st:1},{k:'inf',l:'Beneficiary informed/labelled?'},{k:'apr',l:'Beneficiary will appreciate item?'}]},
  {k:'dig',i:'💻',t:'Digital Assets — General',q:[{k:'dh',l:'How will beneficiaries know about accounts?',st:1},{k:'ac2',l:'Access codes written down?'}]}
];

var FT_LABELS2={grandfather:'Grandfather',grandmother:'Grandmother',father:'Father',mother:'Mother',uncle:'Uncle',auntie:'Auntie',sibling:'Sibling',spouse:'Spouse','in-law':'In-law',child:'Child',grandchild:'Grandchild',nephew:'Nephew',niece:'Niece',cousin:'Cousin',biz:'Biz Partner',other:'Other',me:'Client'};

// JSONP
var _n=0;
function api(act,params,cb){
  var nm='_cb'+(++_n),url=GAS_URL+'?action='+act+'&callback='+nm;
  Object.keys(params).forEach(function(k){url+='&'+k+'='+encodeURIComponent(params[k]);});
  window[nm]=function(d){try{document.head.removeChild(document.getElementById(nm));}catch(e){}delete window[nm];if(cb)cb(null,d);};
  var s=document.createElement('script');s.id=nm;s.src=url;s.onerror=function(){if(cb)cb(new Error('fail'),null);};document.head.appendChild(s);
}

function loadClients(){
  document.getElementById('clientList').innerHTML='<div class="loading">Loading clients...</div>';
  api('getAllClients',{},function(err,data){
    if(err||!data||!data.clients){
      document.getElementById('clientList').innerHTML='<div class="no-data">Could not load clients. Check your Apps Script deployment.</div>';return;
    }
    ALL=data.clients;
    document.getElementById('stTotal').textContent=ALL.length;
    document.getElementById('stAssets').textContent=ALL.filter(function(c){return c.hasAssets;}).length;
    document.getElementById('stBen').textContent=ALL.filter(function(c){return c.hasBens;}).length;
    document.getElementById('stAppt').textContent=ALL.filter(function(c){return c.hasAssets&&c.hasBens;}).length;
    renderList(ALL);
  });
}

function renderList(clients){
  var el=document.getElementById('clientList');
  if(!clients.length){el.innerHTML='<div class="no-data">No clients found.</div>';return;}
  el.innerHTML=clients.map(function(c){
    var status=c.hasAssets&&c.hasBens?'<span class="badge b-done">Active</span>':c.hasAssets||c.hasBens?'<span class="badge b-part">Started</span>':'<span class="badge b-none">Pending</span>';
    return'<div class="client-row" onclick="showClient(\''+c.clientId+'\')"><div>'
      +'<div class="client-name">'+c.name+'</div>'
      +'<div class="client-meta">'+c.email+' &nbsp;·&nbsp; '+fmtDate(c.createdAt)+'</div>'
      +'</div><div class="badges">'+status+'<span class="chev">›</span></div></div>';
  }).join('');
}

function filterClients(q){
  renderList(ALL.filter(function(c){
    return c.name.toLowerCase().includes(q.toLowerCase())||c.email.toLowerCase().includes(q.toLowerCase());
  }));
}

function showClient(id){
  var c=ALL.find(function(x){return x.clientId===id;});
  if(!c)return;
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('dName').textContent=c.name;
  document.getElementById('dEmail').textContent=c.email;
  document.getElementById('dUser').textContent=c.username;
  document.getElementById('dPass').textContent=c.password;
  document.getElementById('dId').textContent=c.clientId;
  document.getElementById('dCreated').textContent=fmtDate(c.createdAt);
  document.getElementById('dContent').innerHTML='<div class="loading">Loading client data...</div>';
  api('getAssets',{clientId:id},function(err,ad){
    api('getComplexity',{clientId:id},function(err2,cd){
      renderDetail(c,ad||{},cd||{});
    });
  });
}

function showList(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='block';
  document.getElementById('searchBar').value='';
  renderList(ALL);
}

function renderDetail(c,ad,cd){
  var html='';

  // ── ASSET INVENTORY ─────────────────────────
  html+='<div class="det-card"><div class="det-title">Asset Inventory</div>';
  var types=ad.types||[];
  if(!types.length){html+='<div class="ndm">No assets recorded.</div>';}
  else{
    html+='<div class="tags">'+types.map(function(k){return'<span class="tag">'+(AT_LABELS[k]||k)+'</span>';}).join('')+'</div>';
    var rows=[];
    if(ad.lsg||ad.los||ad.lot){
      var locs=[];if(ad.lsg)locs.push('Singapore');if(ad.los)locs.push('Overseas');if(ad.lot&&ad.lotx)locs.push(ad.lotx);
      rows.push(['Asset locations',locs.join(', ')]);
    }
    if(ad.sc)rows.push(['Planning scope',ad.sc+(ad.sotx?' ('+ad.sotx+')':'')]);
    if(ad.wealth)rows.push(['Estimated net worth',ad.wealth+(ad.wealthCur?' '+ad.wealthCur:'')]);
    if(ad.otherAssets)rows.push(['Other assets',ad.otherAssets]);
    if(ad.assetNotes)rows.push(['Advisor notes',ad.assetNotes]);
    rows.forEach(function(r){html+='<div class="det-row"><span class="det-lbl">'+r[0]+'</span><span class="det-val">'+r[1]+'</span></div>';});
  }
  html+='</div>';

  // ── SCHEDULE ENTRIES ─────────────────────────
  var entries=ad.entries||{};
  var pqData=ad.pqData||{};
  Object.keys(ENTRY_DEFS).forEach(function(t){
    var arr=entries[t];if(!arr||!arr.length)return;
    var def=ENTRY_DEFS[t];
    html+='<div class="det-card"><div class="det-title">'+def.label+'</div>';
    html+='<div style="overflow-x:auto"><table class="etbl"><thead><tr>';
    def.headers.forEach(function(h){html+='<th>'+h+'</th>';});
    html+='<th>Notes</th></tr></thead><tbody>';
    arr.forEach(function(e,i){
      html+='<tr>';
      def.keys.forEach(function(k){html+='<td>'+(e[k]||'—')+'</td>';});
      html+='<td>'+(e.comment||'—')+'</td></tr>';
      // Planning questions for this entry
      var pqs=PQ_LABELS[t];
      if(pqs){
        var pqAnswers=Object.keys(pqs).map(function(qk){
          var val=pqData[t+'-'+i+'-'+qk];
          return val?'<span style="font-size:11px;color:var(--ink-soft)">'+pqs[qk]+'</span> <strong style="font-size:12px">'+val+'</strong>':null;
        }).filter(Boolean);
        if(pqAnswers.length){
          html+='<tr><td colspan="'+(def.keys.length+1)+'" style="background:var(--gold-pale);font-size:12px;padding:8px 10px">'
            +'<span style="font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--maroon);display:block;margin-bottom:4px">Planning Questions</span>'
            +pqAnswers.join(' &nbsp;·&nbsp; ')+'</td></tr>';
          if(pqData[t+'-'+i+'-pqNotes']){
            html+='<tr><td colspan="'+(def.keys.length+1)+'" style="background:var(--gold-pale);font-size:12px;padding:4px 10px 8px;color:var(--ink-mid)">Note: '+pqData[t+'-'+i+'-pqNotes']+'</td></tr>';
          }
        }
      }
    });
    html+='</tbody></table></div></div>';
  });

  // ── ASSET COMPLEXITY ─────────────────────────
  var secs=cd.sections||{};
  var hasAnyComplexity=CX_SECTIONS.some(function(sec){var d=secs[sec.k]||{};return Object.keys(d).filter(function(k){return k!=='comment';}).length>0;});
  if(hasAnyComplexity){
    html+='<div class="det-card"><div class="det-title">Asset Complexity</div>';
    CX_SECTIONS.forEach(function(sec){
      var d=secs[sec.k]||{};
      var qs=sec.q.filter(function(q){return!q.st;});
      var ans=qs.filter(function(q){return d[q.k];}).length;
      if(!ans&&!d.comment)return;
      html+='<div class="acc" id="adv-cx-'+sec.k+'">'
        +'<div class="acc-h" onclick="tgAcc(\'adv-cx-'+sec.k+'\')">'
        +'<span class="acc-t">'+sec.i+' '+sec.t+'</span>'
        +'<div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:'+(ans===qs.length?'#2D7A4A':'#B8962E')+'">'+(ans===qs.length?'Complete ✓':ans+'/'+qs.length+'answered')+'</span><span class="acc-arr">▾</span></div>'
        +'</div><div class="acc-body">';
      qs.forEach(function(q){
        var v=d[q.k]||'—';
        var cls=v==='Yes'?'yes':v==='No'?'no':v==='—'?'':'oth';
        html+='<div class="qa"><span class="qa-q">'+q.l+'</span><span class="qa-a '+cls+'">'+v+'</span></div>';
      });
      if(d.comment)html+='<div style="margin-top:8px;padding:8px;background:var(--gold-pale);border-radius:var(--radius-sm);font-size:12px;color:var(--ink-mid)"><strong>Comment:</strong> '+d.comment+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
  }

  // ── BENEFICIARIES ────────────────────────────
  var bens=ad.bens||[];
  html+='<div class="det-card"><div class="det-title">Beneficiaries</div>';
  if(!bens.length){html+='<div class="ndm">No beneficiaries identified.</div>';}
  else{
    html+='<div class="tags">'+bens.map(function(k){return'<span class="tag">'+(BT_LABELS[k]||k)+'</span>';}).join('')+'</div>';
    if(ad.benOverseas)html+='<div class="det-row"><span class="det-lbl">Overseas beneficiaries</span><span class="det-val">'+ad.benOverseas+'</span></div>';
    if(ad.benNotes)html+='<div class="det-row"><span class="det-lbl">Notes</span><span class="det-val" style="text-align:left">'+ad.benNotes+'</span></div>';
  }
  html+='</div>';

  // ── FAMILY TREE ──────────────────────────────
  var ft=ad.ft||{};
  var ftNodes=ft.nodes||[];
  var ftEdges=ft.edges||[];
  if(ftNodes.length>1){
    html+='<div class="det-card"><div class="det-title">Family Tree</div>';
    html+='<div class="ft-canvas-wrap"><canvas id="advFtCanvas" class="ft-mini"></canvas></div>';
    // List view below canvas
    html+='<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">';
    ftNodes.forEach(function(n){
      if(n.role==='me')return;
      var gi=n.gender==='M'?'♂':n.gender==='F'?'♀':'○';
      html+='<span style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff">'+gi+' '+n.name+' <span style="color:var(--ink-soft);font-size:10px">('+(FT_LABELS2[n.role]||n.role)+')</span></span>';
    });
    html+='</div>';
    // Connections
    if(ftEdges.length){
      html+='<div style="margin-top:8px;font-size:12px;color:var(--ink-soft)">';
      ftEdges.forEach(function(e){
        var a=ftNodes.find(function(n){return n.id===e.from;});
        var b=ftNodes.find(function(n){return n.id===e.to;});
        if(!a||!b)return;
        var lbl=e.type==='spouse'?'Spouse/Partner':'Parent–child';
        html+='<span style="display:inline-block;margin:2px 4px 2px 0">'+a.name+' ↔ '+b.name+' ('+lbl+')</span>';
      });
      html+='</div>';
    }
    html+='</div>';
  }

  // ── KEY APPOINTMENTS ─────────────────────────
  var a=ad.appt||{};
  if(a.e1n||a.t1n||a.g1n){
    html+='<div class="det-card"><div class="det-title">Key Appointments</div>';
    var arows=[];
    if(a.ex)arows.push(['Executor appointed',a.ex]);
    if(a.e1n)arows.push(['Executor #1',a.e1n+(a.e1r?' ('+a.e1r+')':'')]);
    if(a.esub)arows.push(['Executor #2 role',a.esub]);
    if(a.e2n)arows.push(['Executor #2',a.e2n+(a.e2r?' ('+a.e2r+')':'')]);
    if(a.ep1)arows.push(['Precepts — Sole Executor','Yes']);
    if(a.ep2)arows.push(['Precepts — Final Sub Executor','Yes']);
    if(a.tc)arows.push(['Trustee selection',a.tc]);
    if(a.t1n)arows.push(['Trustee #1',a.t1n+(a.t1r?' ('+a.t1r+')':'')]);
    if(a.tsub)arows.push(['Trustee #2 role',a.tsub]);
    if(a.t2n)arows.push(['Trustee #2',a.t2n+(a.t2r?' ('+a.t2r+')':'')]);
    if(a.tp1)arows.push(['Precepts — Trustee','Yes']);
    if(a.gu)arows.push(['Guardian appointed',a.gu]);
    if(a.g1w)arows.push(['Guardian #1 when to act',a.g1w]);
    if(a.g1n)arows.push(['Guardian #1',a.g1n+(a.g1r?' ('+a.g1r+')':'')]);
    if(a.g2rl)arows.push(['Guardian #2 role',a.g2rl]);
    if(a.g2n)arows.push(['Guardian #2',a.g2n+(a.g2r?' ('+a.g2r+')':'')]);
    if(a.notes)arows.push(['Notes',a.notes]);
    arows.forEach(function(r){html+='<div class="det-row"><span class="det-lbl">'+r[0]+'</span><span class="det-val">'+r[1]+'</span></div>';});
    html+='</div>';
  }

  document.getElementById('dContent').innerHTML=html;

  // Draw mini family tree
  if(ftNodes.length>1){
    setTimeout(function(){drawMiniTree(ftNodes,ftEdges);},100);
  }
}

function drawMiniTree(nodes,edges){
  var canvas=document.getElementById('advFtCanvas');
  if(!canvas)return;
  var w=canvas.offsetWidth||300,h=canvas.offsetHeight||280;
  canvas.width=w;canvas.height=h;
  var ctx=canvas.getContext('2d');
  var NW=70,NH=30;
  // Simple auto-layout by role
  var genMap={'-3':[],'  -2':[],'  -1':[],'0':[],'1':[],'2':[],'3':[],'99':[]};
  var roleGen={grandfather:-2,grandmother:-2,father:-1,mother:-1,uncle:-1,auntie:-1,sibling:0,spouse:0,'in-law':0,me:0,child:1,grandchild:2,nephew:1,niece:1,cousin:0,biz:99,other:0};
  var byGen={};
  nodes.forEach(function(n){
    var g=roleGen[n.role]!==undefined?roleGen[n.role]:0;
    if(!byGen[g])byGen[g]=[];
    byGen[g].push(n);
  });
  var gens=Object.keys(byGen).map(Number).sort(function(a,b){return a-b;});
  var totalGens=gens.length;
  var levelH=Math.min(80,(h-40)/Math.max(totalGens,1));
  var centerX=w/2,startY=20+levelH/2;
  var posMap={};
  gens.forEach(function(g,gi){
    var row=byGen[g];
    var totalW=row.length*NW+(row.length-1)*14;
    var sx=centerX-totalW/2+NW/2;
    row.forEach(function(n,i){
      posMap[n.id]={x:sx+i*(NW+14),y:startY+gi*levelH};
    });
  });
  // Draw edges
  edges.forEach(function(e){
    var a=posMap[e.from],b=posMap[e.to];
    if(!a||!b)return;
    ctx.save();
    if(e.type==='spouse'){ctx.strokeStyle='#B8962E';ctx.lineWidth=2;ctx.setLineDash([]);}
    else{ctx.strokeStyle='#7A6455';ctx.lineWidth=1.2;ctx.setLineDash([]);}
    ctx.beginPath();
    if(e.type==='spouse'){ctx.moveTo(a.x+(a.x<b.x?NW/2:-NW/2),a.y);ctx.lineTo(b.x+(b.x<a.x?NW/2:-NW/2),b.y);}
    else{var py=a.y+(a.y<b.y?NH/2:-NH/2),cy=b.y+(b.y<a.y?NH/2:-NH/2),my=(py+cy)/2;ctx.moveTo(a.x,py);ctx.lineTo(a.x,my);ctx.lineTo(b.x,my);ctx.lineTo(b.x,cy);}
    ctx.stroke();ctx.restore();
  });
  // Draw nodes
  nodes.forEach(function(n){
    var pos=posMap[n.id];if(!pos)return;
    var isMe=n.role==='me';
    ctx.save();
    ctx.fillStyle=isMe?'#6B1A2A':'#fff';
    ctx.strokeStyle=isMe?'#4A1019':'#D4AF5A';
    ctx.lineWidth=isMe?1.5:0.8;
    ctx.beginPath();ctx.roundRect(pos.x-NW/2,pos.y-NH/2,NW,NH,5);ctx.fill();ctx.stroke();
    ctx.fillStyle=isMe?'#D4AF5A':'#1C1410';
    ctx.font='500 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(n.name.length>8?n.name.slice(0,8)+'…':n.name,pos.x,pos.y+4);
    ctx.restore();
  });
}

function tgAcc(id){document.getElementById(id).classList.toggle('open');}

function fmtDate(s){
  if(!s)return'—';
  try{var d=new Date(s);return d.toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});}
  catch(e){return s;}
}
